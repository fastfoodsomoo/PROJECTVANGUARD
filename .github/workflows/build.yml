name: Build & Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install build tools
      run: sudo apt-get update && sudo apt-get install -y g++ make

    - name: Build Server
      run: make my_server

    - name: Build Sentinel
      run: make sentinel

    - name: Run Unit Tests
      run: make test-unit
