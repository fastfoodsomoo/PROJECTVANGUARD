# ─── Vanguard Configuration ─────────────────────────────────────
# This file is shared by both server.cpp and sentinel.cpp.
# Lines starting with '#' are comments.

# ── Server Settings ─────────────────────────────────────────────
port            = 8080
max_connections = 64
recv_timeout    = 5
log_path        = server_log.txt

# ── Sentinel Settings ───────────────────────────────────────────
# Ban an IP after it connects this many times within the time window.
ban_threshold   = 5
time_window     = 60
whitelist       = whitelist.conf
